services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "18083:80"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 --silent && php -r \"exit(@file_get_contents('http://127.0.0.1/frontend/index.html') === false ? 1 : 0);\""]
      interval: 5s
      timeout: 5s
      retries: 20
