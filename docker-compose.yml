services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: talkincampus
      MYSQL_ROOT_PASSWORD: your_password
    ports:
      - "3306:3306"
    volumes:
      - ./database:/docker-entrypoint-initdb.d  # 自动执行你的 schema.sql 和 seed.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pyour_password"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    environment:
      DB_HOST: db
      DB_NAME: talkincampus
      DB_USER: root
      DB_PASS: your_password
    volumes:
      - ./backend:/var/www/html/backend
      - ./frontend:/var/www/html/frontend
    depends_on:
      db:
        condition: service_healthy
